services:
  postgres:
    container_name: ktor-template-postgres
    networks:
      - proxynet
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "secret"
      POSTGRES_DB: "ktor-template"
    ports:
      - "5432:5432"
    expose:
      - "5432"

networks:
  proxynet:
    name: ktor-template-network
