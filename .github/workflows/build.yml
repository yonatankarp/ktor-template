name: Continuous Integration

# Self-contained CI for the ktor-template repo. Intentionally inline (no `uses:` of
# reusable workflows) so the template works out of the box on any GitHub repo. When
# the shared github-actions repo grows a clean JVM/Ktor reusable workflow, this file
# becomes the source of truth for what that workflow should do — extract then
# replace the inlined steps with a `uses:` reference.

on:
  pull_request:
    types: [ opened, synchronize, reopened, ready_for_review ]
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # publish test summary as a PR check
      checks: write          # publish unit test results action

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          junit_files: '**/build/test-results/test/TEST-*.xml'

      - name: Upload test & coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            **/build/reports/tests/**/*
            **/build/reports/jacoco/test/**/*
          if-no-files-found: ignore

  dependabot_auto_merge:
    name: Dependabot auto-merge
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Auto-merge minor and patch bumps only. Major bumps still require a human
      # review. Repo must have auto-merge enabled in Settings → General for this
      # to actually merge once required checks pass.
      - name: Enable auto-merge for minor & patch updates
        if: ${{ steps.metadata.outputs.update-type == 'version-update:semver-minor' || steps.metadata.outputs.update-type == 'version-update:semver-patch' }}
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "$PR_URL"
